server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 百炼（阿里云 DashScope）反代：/bailian/* -> https://dashscope.aliyuncs.com/*
    # 百炼 /api/v1/tasks 端点不带 CORS 头，浏览器直连视频轮询会被拦；走此同源代理即可。
    # 渠道 Base URL 填 https://<站点>/bailian
    location /bailian/ {
        rewrite ^/bailian/(.*)$ /$1 break;
        proxy_pass https://dashscope.aliyuncs.com;
        proxy_ssl_server_name on;
        proxy_set_header Host dashscope.aliyuncs.com;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header X-DashScope-Async $http_x_dashscope_async;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-DashScope-Async" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
